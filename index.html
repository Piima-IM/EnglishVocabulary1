<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg: #f8fafc; 
      --card: rgba(255, 255, 255, 0.7);
      --card-strong: rgba(255, 255, 255, 0.9);
      --stroke: rgba(0, 0, 0, 0.08);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #7c3aed;
      --shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(168, 85, 247, 0.12), transparent 40%),
        radial-gradient(circle at bottom, rgba(16, 185, 129, 0.08), transparent 40%),
        var(--bg);
      overflow-x: hidden;
    }

    .container {
      width: min(92vw, 760px);
      margin-top: 26px;
      padding: 26px;
      border-radius: 24px;
      background: var(--card);
      backdrop-filter: blur(18px);
      position: relative;
      box-shadow: inset 0 0 0 1px var(--stroke), var(--shadow);
      z-index: 1;
      overflow: hidden; /* Чтобы свечение не выходило за края */
  transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
.container:hover {
  transform: translateY(-8px);
}
  .container::after {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 5px; /* Рамка чуть толще, чем у карточек */
  background: radial-gradient(
    500px circle at var(--main-mouse-x, 50%) var(--main-mouse-y, 50%),
    rgba(124, 58, 237, 0.4),
    rgba(37, 99, 235, 0.3) 40%,
    transparent 80%
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.5s ease;
  pointer-events: none;
  z-index: 3;
}

.container:hover::after {
  opacity: 1;
}
    h1 {
      margin: 10px 0 6px;
      text-align: center;
      font-size: clamp(2.5rem, 4vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(90deg, #4c1d95, #7c3aed, #2563eb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h2 {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
    }

    /* Базовый стиль карточки */
.player-card {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 16px 18px;
  margin-bottom: 12px;
  border-radius: 18px;
  background: var(--card-strong);
  border: 1px solid var(--stroke);
  transition: transform 0.3s ease, box-shadow 0.3s ease; /* Плавное приподнятие */
  opacity: 0;
  transform: translateY(15px);
  position: relative; /* Важно для позиционирования рамки */
  overflow: hidden; /* Чтобы свечение не вылетало за границы */
}

/* Эффект приподнятости при наведении */
.player-card:hover {
  transform: translateY(-3px) scale(1.02); /* Карточка "всплывает" */
  box-shadow: 0 20px 40px rgba(124, 58, 237, 0.15);
  z-index: 10;
}

/* Динамическая подсветка краев */
.player-card::after {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 4px; /* Толщина рамки */
  background: radial-gradient(
    300px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(168, 85, 247, 0.6),
    rgba(34, 197, 94, 0.4) 40%,
    transparent 80%
  );
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  opacity: 0;
  transition: opacity 0.3s ease;
  pointer-events: none;
}

.player-card:hover::after {
  opacity: 1; /* Рамка видна только при наведении */
}


    /* Подсветка групп победителей */
    .tier-1 {
      background: linear-gradient(135deg, #fefce8, #fef3c7) !important;
      border-color: #fde047 !important;
      box-shadow: 0 10px 20px rgba(250, 204, 21, 0.2);
    }
    .tier-2 {
      background: linear-gradient(135deg, #f8fafc, #f1f5f9) !important;
      border-color: #cbd5e1 !important;
    }
    .tier-3 {
      background: linear-gradient(135deg, #fff7ed, #ffedd5) !important;
      border-color: #fdba74 !important;
    }

    .rank-name-block {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0;
    }

    .name-info-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .rank-display {
      font-size: 1.5rem;
      font-weight: 800;
      min-width: 42px;
      text-align: center;
      color: #1e293b;
    }

    .rank-display.medal { font-size: 2.2rem; }

    .name-display {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 2px 10px;
      border-radius: 8px;
      width: fit-content;
      text-transform: uppercase;
      color: #475569;
      border: 1px solid rgba(0,0,0,0.1);
    }

    .badge-yellow { background-color: #fef08a; border-color: #facc15; }
    .badge-blue   { background-color: #bfdbfe; border-color: #60a5fa; }
    .badge-red    { background-color: #fecaca; border-color: #f87171; }
    .badge-green  { background-color: #bbf7d0; border-color: #4ade80; }
    .badge-default { background-color: #e2e8f0; }

    .score-display {
      font-size: 1.63rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a855f7, #22c55e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .footer { text-align: center; padding: 20px; color: #64748b; }
    .footer a { color: #7c3aed; text-decoration: none; font-weight: 700; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .rank-display { font-size: 1.2rem; min-width: 35px; }
      .rank-display.medal { font-size: 1.7rem; }
      .name-display { font-size: 0.95rem; }
      .score-display { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>🏆 Leaderboard</h1>
    <h2 id="listTitle"></h2>
    <div id="leaderboardList">
      <div style="text-align:center; padding: 20px; color: #94a3b8;">
        <i class="fas fa-spinner fa-spin"></i> Загрузка...
      </div>
    </div>
  </div>

  <footer class="footer">
    Made by <a href="https://AbdurahmonovBehruz.github.io/Info" target="_blank">Behruz</a>
    <i class="fa-solid fa-arrow-up-right-from-square"></i>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBFKNH17HTqnIQk6HMDxBWmUCmiPwpf3D8",
      authDomain: "namelist-1bf07.firebaseapp.com",
      databaseURL: "https://namelist-1bf07-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "namelist-1bf07",
      storageBucket: "namelist-1bf07.firebasestorage.app",
      messagingSenderId: "325136855046",
      appId: "1:325136855046:web:bac259ab885ca8381fd387"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const playersRef = ref(db, 'players');
    const titleRef = ref(db, 'settings/title');

    const listDiv = document.getElementById('leaderboardList');
    const titleEl = document.getElementById('listTitle');

    onValue(playersRef, (snapshot) => {
      const data = snapshot.val();
      listDiv.innerHTML = '';

      if (!data) {
        listDiv.innerHTML = '<div style="text-align:center">Список пуст</div>';
        return;
      }

      const playersArray = Object.keys(data).map(key => ({ id: key, ...data[key] }));
      
      // Сортировка по баллам
      playersArray.sort((a, b) => (Number(b.score) || 0) - (Number(a.score) || 0));

      let lastScore = null;
      let currentRank = 1;
// Находим основной контейнер
const mainContainer = document.querySelector('.container');

mainContainer.addEventListener('mousemove', (e) => {
  const rect = mainContainer.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  
  // Используем уникальное имя переменной, чтобы не путать с карточками
  mainContainer.style.setProperty('--main-mouse-x', `${x}px`);
  mainContainer.style.setProperty('--main-mouse-y', `${y}px`);
});

      playersArray.forEach((player, index) => {
        const pScore = Number(player.score) || 0;

        // Спортивное ранжирование (1, 1, 3...)
        if (pScore !== lastScore) {
          currentRank = index + 1;
        }
        lastScore = pScore;

        let fullName = player.name ?? 'Unknown';
        let displayName = fullName;
        let subText = '';
        let badgeColor = 'badge-default';

        // Парсинг значков из имени (текст в скобках)
        const match = fullName.match(/(.*?)\s*\((.*)\)/);
        if (match) {
          displayName = match[1].trim();
          subText = match[2].trim();
          const upperSub = subText.toUpperCase();
          if (upperSub.includes('YELLOW')) badgeColor = 'badge-yellow';
          else if (upperSub.includes('BLUE')) badgeColor = 'badge-blue';
          else if (upperSub.includes('RED')) badgeColor = 'badge-red';
          else if (upperSub.includes('GREEN')) badgeColor = 'badge-green';
        }

        const card = document.createElement('div');
        card.className = 'player-card';
        card.onmousemove = (e) => {
  const rect = card.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  card.style.setProperty('--mouse-x', `${x}px`);
  card.style.setProperty('--mouse-y', `${y}px`);
};
        // Присвоение иконки и класса подсветки
        let rankIcon = currentRank;
        if (currentRank === 1) {
          rankIcon = '🥇';
          card.classList.add('tier-1');
        } else if (currentRank === 2) {
          rankIcon = '🥈';
          card.classList.add('tier-2');
        } else if (currentRank === 3) {
          rankIcon = '🥉';
          card.classList.add('tier-3');
        }

        card.innerHTML = `
          <div class="rank-name-block">
            <span class="rank-display ${currentRank <= 3 ? 'medal' : ''}">${rankIcon}</span>
            <div class="name-info-container">
              <span class="name-display">${displayName}</span>
              ${subText ? `<span class="badge ${badgeColor}">${subText}</span>` : ''}
            </div>
          </div>
          <span class="score-display">${pScore}</span>
        `;

        listDiv.appendChild(card);
        
        // Анимация появления
        setTimeout(() => {
          card.style.animation = "fadeSlideIn 0.5s ease forwards";
        }, index * 50);
      });
    });

    onValue(titleRef, (snapshot) => {
      titleEl.innerText = snapshot.val() || '';
    });
  </script>
</body>
</html>
