<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
    :root {
      --bg: #f8fafc; 
      --card: rgba(255, 255, 255, 0.7);
      --card-strong: rgba(255, 255, 255, 0.9);
      --stroke: rgba(0, 0, 0, 0.08);
      --stroke-strong: rgba(0, 0, 0, 0.15);
      --text: #0f172a;
      --muted: #64748b;
      --accent: #7c3aed;
      --accent2: #059669;
      --accent3: #2563eb;
      --shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(168, 85, 247, 0.12), transparent 40%),
        radial-gradient(circle at bottom, rgba(16, 185, 129, 0.08), transparent 40%),
        var(--bg);
      overflow-x: hidden;
    }

    .container {
      width: min(92vw, 760px);
      margin-top: 26px;
      padding: 26px;
      border-radius: 24px;
      background: var(--card);
      backdrop-filter: blur(18px);
      position: relative;
      box-shadow: inset 0 0 0 1px var(--stroke), var(--shadow);
      z-index: 1;
    }

    h1 {
      margin: 10px 0 6px;
      text-align: center;
      font-size: clamp(2.5rem, 4vw, 3.2rem);
      font-weight: 800;
      background: linear-gradient(90deg, #4c1d95, #7c3aed, #2563eb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    h2 {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .player-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      margin-bottom: 12px;
      border-radius: 18px;
      background: var(--card-strong);
      border: 1px solid var(--stroke);
      transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .player-card:hover {
      transform: translateY(-5px) scale(1.01);
      box-shadow: 0 15px 30px rgba(0,0,0,0.1);
    }

    /* Блок имени и ранга */
    .rank-name-block {
      display: flex;
      align-items: center;
      gap: 14px;
      flex: 1;
      min-width: 0;
    }

    /* Контейнер для текста имени и значка под ним */
    .name-info-container {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .rank-display {
      font-size: 1.3rem;
      font-weight: 800;
      min-width: 38px;
      text-align: center;
    }

    .rank-display.medal { font-size: 2rem; }

    .name-display {
      font-size: 1.08rem;
      font-weight: 700;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Стили значка (Badge) */
    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 800;
      padding: 2px 10px;
      border-radius: 8px;
      width: fit-content;
      text-transform: uppercase;
      color: #475569; /* Серый текст внутри */
      border: 1px solid rgba(0,0,0,0.1);
    }

    /* Цвета для коробок */
    .badge-yellow { background-color: #fef08a; border-color: #facc15; }
    .badge-blue   { background-color: #bfdbfe; border-color: #60a5fa; }
    .badge-red    { background-color: #fecaca; border-color: #f87171; }
    .badge-green  { background-color: #bbf7d0; border-color: #4ade80; }
    .badge-default { background-color: #e2e8f0; }

    .score-display {
      font-size: 1.63rem;
      font-weight: 800;
      background: linear-gradient(90deg, #a855f7, #22c55e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .footer { text-align: center; padding: 20px; color: #64748b; }
    .footer a { color: #7c3aed; text-decoration: none; font-weight: 700; }

    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 520px) {
      .name-display { font-size: 0.95rem; }
      .score-display { font-size: 1.3rem; }
    }
  </style>
</head>
<body>

  <div class="container" id="glowContainer">
    <h1>🏆 Leaderboard</h1>
    <h2 id="listTitle"></h2>
    <div id="leaderboardList" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Загрузка...
    </div>
  </div>

  <footer class="footer">
    Made by <a href="https://AbdurahmonovBehruz.github.io/Info" target="_blank">Behruz</a><i class="fa-solid fa-arrow-up-right-from-square"></i>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBFKNH17HTqnIQk6HMDxBWmUCmiPwpf3D8",
      authDomain: "namelist-1bf07.firebaseapp.com",
      databaseURL: "https://namelist-1bf07-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "namelist-1bf07",
      storageBucket: "namelist-1bf07.firebasestorage.app",
      messagingSenderId: "325136855046",
      appId: "1:325136855046:web:bac259ab885ca8381fd387"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const playersRef = ref(db, 'players');
    const titleRef = ref(db, 'settings/title');

    const listDiv = document.getElementById('leaderboardList');
    const titleEl = document.getElementById('listTitle');

    onValue(playersRef, (snapshot) => {
      const data = snapshot.val();
      listDiv.innerHTML = '';

      if (!data) {
        listDiv.innerHTML = '<div style="text-align:center">Список пуст</div>';
        return;
      }

      const playersArray = Object.keys(data).map(key => ({ id: key, ...data[key] }));
      playersArray.sort((a, b) => (Number(b.score) || 0) - (Number(a.score) || 0));

      playersArray.forEach((player, index) => {
        let fullName = player.name ?? 'Unknown';
        let displayName = fullName;
        let subText = '';
        let colorClass = 'badge-default';

        // Регулярное выражение для поиска текста в скобках
        // Пример: "Behruz (8 YELLOW)" -> [1] "Behruz ", [2] "8 YELLOW"
        const match = fullName.match(/(.*?)\s*\((.*)\)/);
        
        if (match) {
          displayName = match[1].trim();
          subText = match[2].trim();
          
          const upperSub = subText.toUpperCase();
          if (upperSub.includes('YELLOW')) colorClass = 'badge-yellow';
          else if (upperSub.includes('BLUE')) colorClass = 'badge-blue';
          else if (upperSub.includes('RED')) colorClass = 'badge-red';
          else if (upperSub.includes('GREEN')) colorClass = 'badge-green';
        }

        const card = document.createElement('div');
        card.className = 'player-card';
        if (index === 0) card.classList.add('rank-1');
        if (index === 1) card.classList.add('rank-2');
        if (index === 2) card.classList.add('rank-3');

        let rankIcon = index + 1;
        if (index === 0) rankIcon = '🥇';
        if (index === 1) rankIcon = '🥈';
        if (index === 2) rankIcon = '🥉';

        card.innerHTML = `
          <div class="rank-name-block">
            <span class="rank-display ${index < 3 ? 'medal' : ''}">${rankIcon}</span>
            <div class="name-info-container">
              <span class="name-display">${displayName}</span>
              ${subText ? `<span class="badge ${colorClass}">${subText}</span>` : ''}
            </div>
          </div>
          <span class="score-display">${player.score ?? 0}</span>
        `;

        listDiv.appendChild(card);
        setTimeout(() => {
          card.style.animation = "fadeSlideIn 0.5s ease forwards";
        }, index * 50);
      });
    });

    onValue(titleRef, (snapshot) => {
      titleEl.innerText = snapshot.val() || '';
    });
  </script>
</body>
</html>
