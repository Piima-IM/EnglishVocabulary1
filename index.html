<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Leaderboard</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

  <style>
        :root {
      --bg: #f8fafc; /* Светлый фон */
      --card: rgba(255, 255, 255, 0.7); /* Полупрозрачный белый */
      --card-strong: rgba(255, 255, 255, 0.9);
      --stroke: rgba(0, 0, 0, 0.08); /* Темные границы */
      --stroke-strong: rgba(0, 0, 0, 0.15);
      --text: #0f172a; /* Темный текст */
      --muted: #64748b;
      --accent: #7c3aed; /* Чуть более насыщенный фиолетовый */
      --accent2: #059669;
      --accent3: #2563eb;
      --shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.1);
    }


    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      padding: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      color: var(--text);
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background:
        radial-gradient(circle at top, rgba(168, 85, 247, 0.12), transparent 40%),
        radial-gradient(circle at bottom, rgba(16, 185, 129, 0.08), transparent 40%),
        var(--bg);
      overflow-x: hidden;
      position: relative;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-size: 40px 40px;
      background-image:
        linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      opacity: 0.5;
      z-index: 0;
    }

    .container {
      width: min(92vw, 760px);
      margin-top: 26px;
      margin-bottom: auto;
      padding: 26px;
      border-radius: 24px;
      background: var(--card);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      position: relative;
      
      box-shadow:
        inset 0 0 0 1px var(--stroke),
        var(--shadow);
      border: 2px solid rgba(255, 255, 255, 0.03);
      z-index: 1;
    }

    .container::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20px;
      right: 20px;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
      border-radius: 0 0 999px 999px;
      box-shadow: 0 0 18px rgba(168, 85, 247, 0.45);
      z-index: 2;
    }

   .container::after {
  content: "";
  position: absolute;
  /* Растягиваем чуть шире контейнера, чтобы создать рамку */
  inset: -1.5px; 
  border-radius: inherit;
  padding: 3px; /* Толщина светящейся рамки */
  
  /* Многоцветный градиент, который следует за мышью */
  background: radial-gradient(
    400px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(168, 85, 247, 0.8),
    rgba(16, 185, 129, 0.6) 25%,
    rgba(59, 130, 246, 0.4) 50%,
    transparent 80%
  );

  /* Магия: вырезаем середину, оставляя только padding (рамку) */
  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  opacity: 0;
  transition: opacity 0.4s ease;
  pointer-events: none;
  z-index: 3; /* Чтобы свечение было поверх всех слоев фона */
}

/* Показываем при наведении на контейнер */
.container:hover::after {
  opacity: 1;
}

      
      

   

    h1 {
      margin: 10px 0 6px;
      text-align: center;
      font-size: clamp(2.5rem, 4vw, 3.2rem);
      font-weight: 800;
      letter-spacing: 2px;
      text-transform: uppercase;
      background: linear-gradient(90deg, #4c1d95, #7c3aed, #2563eb);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 30px rgba(168, 85, 247, 0.12);
      position: relative;
      z-index: 2;
    }

    h2 {
      margin: 0 0 24px;
      text-align: center;
      color: var(--muted);
      font-size: 0.98rem;
      font-weight: 500;
      letter-spacing: 1px;
      position: relative;
      z-index: 2;
      min-height: 1.2em;
    }

    #leaderboardList {
      position: relative;
      z-index: 2;
    }

    .loading {
      text-align: center;
      color: #94a3b8;
      padding: 40px 16px;
      font-style: italic;
    }

    .player-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 18px;
      margin-bottom: 12px;
      border-radius: 18px;
      background: var(--card-strong);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--stroke);
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.02);
      position: relative;
      overflow: hidden;
      transition:
        transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275),
        box-shadow 0.35s ease,
        border-color 0.35s ease,
        background 0.35s ease;
    }

    .player-card::before {
  transition: opacity 0.25s ease;
}
.player-card::after {
  content: "";
  position: absolute;
  inset: -1px;
  border-radius: inherit;
  padding: 4px;

  background: radial-gradient(
    300px circle at var(--mouse-x, 50%) var(--mouse-y, 50%),
    rgba(168, 85, 247, 1),
    rgba(16, 185, 129, 0.9) 30%,
    rgba(59, 130, 246, 0.7) 60%,
    transparent 100%
  );

  -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;

  opacity: 0;
  transition: opacity 0.25s ease;
}

    .player-card:hover {
  transform: translateY(-10px) scale(1.02);

  box-shadow:
    inset 0 0 0 1px rgba(255,255,255,0.12),
    0 35px 70px -15px rgba(168, 85, 247, 0.45),
    0 0 30px rgba(168, 85, 247, 0.25);

  border-color: rgba(255,255,255,0.18);
}

    .player-card:hover::before,
    .player-card:hover::after {
      opacity: 1;
    }

    .player-card > * {
      position: relative;
      z-index: 1;
    }

    .player-card.rank-1 {
      background: linear-gradient(180deg, #fefce8, #fef3c7);
      border-color: #fde047;
    }

    .player-card.rank-2 {
      background: linear-gradient(180deg, #f8fafc, #f1f5f9);
      border-color: #cbd5e1;
    }

    .player-card.rank-3 {
      background: linear-gradient(180deg, #fff7ed, #ffedd5);
      border-color: #fdba74;
    }

    .rank-name-block {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
      flex: 1;
    }

    .rank-display {
      font-size: 1.3rem;
      font-weight: 800;
      color: #000000;
      min-width: 38px;
      text-align: center;
      display: flex;
      justify-content: center;
      align-items: center;
      flex: 0 0 auto;
    }

    .rank-display.medal {
      font-size: 2rem;
      min-width: 42px;
    }

    .name-display {
      font-size: 1.08rem;
      font-weight: 600;
      color: #1e293b;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .score-display {
      font-size: 1.63rem;
      font-weight: 800;
      white-space: nowrap;
      background: linear-gradient(90deg, #a855f7, #22c55e);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      flex: 0 0 auto;
      transform: scale(1.08);
  
    }

    .footer {
      text-align: center;
      padding: 28px 10px 20px;
      color: #64748b;
      font-size: 14px;
      letter-spacing: 0.6px;
      position: relative;
      z-index: 1;
    }

    .footer a {
      color: #c084fc;
      text-decoration: none;
      font-weight: 700;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    .footer a:hover {
      color: #ffffff;
      text-shadow: 0 0 8px rgba(168, 85, 247, 0.45);
    }

    .footer i {
      font-size: 11px;
      margin-left: 5px;
      color: #94a3b8;
      transition: color 0.2s ease;
    }

    .footer a:hover i {
      color: #ffffff;
    }

    @media (max-width: 520px) {
      body {
        padding: 8px;
      }

      .container {
        width: min(94vw, 760px);
        padding: 16px;
        border-radius: 18px;
      }

      h1 {
        letter-spacing: 1.5px;
      }

      h2 {
        margin-bottom: 18px;
        font-size: 0.92rem;
      }

      .player-card {
        padding: 13px 14px;
        gap: 10px;
        border-radius: 16px;
      }

      .rank-name-block {
        gap: 10px;
      }

      .rank-display {
        min-width: 30px;
        font-size: 1.1rem;
      }

      .rank-display.medal {
        font-size: 1.55rem;
        min-width: 30px;
      }

      .name-display {
        font-size: 0.686rem;
      }

      .score-display {
        font-size: 1.27rem;
      }
      

      .footer {
        padding-top: 20px;
        font-size: 13px;
      }
    }

    @media (max-width: 380px) {
      .player-card {
        padding: 12px 12px;
      }

      .name-display {
        max-width: 150px;
      }

      .score-display {
        font-size: 1.12rem;
      }
    }
  @keyframes fadeSlideIn {
  from {
    opacity: 0;
    transform: translateY(20px) scale();
    filter: blur(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
    filter: blur(0);
  }
}

.player-card {
  opacity: 0;
  transform: translateY(20px);
}
  </style>
</head>
<body>

  <div class="container" id="glowContainer">
    <h1>🏆 Leaderboard</h1>
    <h2 id="listTitle"></h2>

    <div id="leaderboardList" class="loading">
      <i class="fas fa-spinner fa-spin"></i> Loading...
    </div>
  </div>

  <footer class="footer">
    Made by <a href="https://AbdurahmonovBehruz.github.io/Info" target="_blank" rel="noopener noreferrer">Behruz</a>
    <i class="fa-solid fa-arrow-up-right-from-square"></i>
  </footer>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBFKNH17HTqnIQk6HMDxBWmUCmiPwpf3D8",
      authDomain: "namelist-1bf07.firebaseapp.com",
      databaseURL: "https://namelist-1bf07-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "namelist-1bf07",
      storageBucket: "namelist-1bf07.firebasestorage.app",
      messagingSenderId: "325136855046",
      appId: "1:325136855046:web:bac259ab885ca8381fd387"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    const playersRef = ref(db, 'players');
    const titleRef = ref(db, 'settings/title');

    const listDiv = document.getElementById('leaderboardList');
    const titleEl = document.getElementById('listTitle');
    const glowContainer = document.getElementById('glowContainer');

    glowContainer.addEventListener('mousemove', (e) => {
      const rect = glowContainer.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      glowContainer.style.setProperty('--mouse-x', `${x}px`);
      glowContainer.style.setProperty('--mouse-y', `${y}px`);
    });

    onValue(playersRef, (snapshot) => {
      const data = snapshot.val();
      listDiv.innerHTML = '';

      if (!data) {
        listDiv.innerHTML = '<div class="loading">List is currently empty.</div>';
        return;
      }

      const playersArray = Object.keys(data).map(key => ({
        id: key,
        ...data[key]
      }));

      playersArray.sort((a, b) => {
        const scoreA = Number(a.score) || 0;
        const scoreB = Number(b.score) || 0;
        return scoreB - scoreA;
      });

      playersArray.forEach((player, index) => {
        let rankContent = index + 1;
        let cardClass = 'player-card';
        let rankClass = 'rank-display';

        if (index === 0) {
          rankContent = '🥇';
          cardClass += ' rank-1';
          rankClass += ' medal';
        } else if (index === 1) {
          rankContent = '🥈';
          cardClass += ' rank-2';
          rankClass += ' medal';
        } else if (index === 2) {
          rankContent = '🥉';
          cardClass += ' rank-3';
          rankClass += ' medal';
        }

        const cardRef = document.createElement('div');
        cardRef.className = cardClass;

        cardRef.addEventListener('mousemove', (e) => {
          const rect = cardRef.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          cardRef.style.setProperty('--mouse-x', `${x}px`);
          cardRef.style.setProperty('--mouse-y', `${y}px`);
        });

        cardRef.innerHTML = `
          <div class="rank-name-block">
            <span class="${rankClass}">ᅠ${rankContent}</span>
            <span class="name-display">${player.name ?? 'Unknown'}</span>
          </div>
          <span class="score-display">${player.score ?? 0}ᅠ</span>
        `;

        listDiv.appendChild(cardRef);
        setTimeout(() => {
  cardRef.style.animation = "fadeSlideIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) forwards";
}, index * 80);
      });
    });

    onValue(titleRef, (snapshot) => {
      const newTitle = snapshot.val();
      titleEl.innerText = newTitle || '';
    });
  </script>
</body>
</html>
